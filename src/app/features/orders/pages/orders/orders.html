<main>
    <section class="head">
        <h1>Listado de órdenes</h1>
        <app-link href="/orders/create">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="ai ai-File"><path d="M4 4v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8.342a2 2 0 0 0-.602-1.43l-4.44-4.342A2 2 0 0 0 13.56 2H6a2 2 0 0 0-2 2z"/><path d="M9 13h6"/><path d="M9 17h3"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>
            <span>Simular una órden</span>
        </app-link>
    </section>
    <div class="grid-layout">
        <app-filters />
        <app-list
            [thead]="['#', 'Total', 'Cliente', 'Fecha']"
            [tbody]="mappedOrders"
            [totalPages]="totalPages()"
            [isLoading]="orders() === null"
        />
    </div>
</main>
