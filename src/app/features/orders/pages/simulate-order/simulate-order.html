@let items = mappedItems;
@let hasResult = !!items?.length;

<main>
    <section class="ticket-container" [class.show]="hasResult && !hide()">
        <span>Ticket generado</span>
        <app-ticket
            [order]="{
                total: total / 100,
                items,
                id: 0,
                createdAt: date(),
                updatedAt: date(),
                customer: {
                    id: 1,
                    name: 'Lautaro',
                    surname: 'Kazalukian',
                    contacts: [],
                    createdAt: date(),
                    updatedAt: date()
                }
            }"
        />
        <app-button
            (onClick)="createOrder()"
            [disabled]="isSubmiting()"
        >
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="ai ai-File"><path d="M4 4v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8.342a2 2 0 0 0-.602-1.43l-4.44-4.342A2 2 0 0 0 13.56 2H6a2 2 0 0 0-2 2z"/><path d="M9 13h6"/><path d="M9 17h3"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>
            <span>Registrar orden</span>
        </app-button>
    </section>
    <section class="input-container">
        <h1>Simula una orden</h1>
        <app-order-message-box
            (messageChange)="message.set($event.trim())"
            [message]="message()"
            [disabled]="isSubmiting()"
        />
    </section>
</main>
